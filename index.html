<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spinning Decision Wheel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    .wheel-disc {
      will-change: transform;
      transform: translateZ(0);
    }
    
    @media (prefers-reduced-motion: reduce) {
      .wheel-disc {
        transition-duration: 0.1s !important;
      }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-purple-900 via-blue-900 to-indigo-900"></body>
  <div class="min-h-screen flex items-center justify-center p-8">
    <div class="relative">
      <div class="relative w-96 h-96 mx-auto" style="perspective: 1000px;">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-2 z-20 w-0 h-0 border-l-[20px] border-l-transparent border-r-[20px] border-r-transparent border-t-[40px] border-t-yellow-400 drop-shadow-2xl"></div>
        
        <div id="wheel" class="wheel-disc absolute inset-0 rounded-full shadow-2xl" style="transform-style: preserve-3d;">
          
          <!-- Segment 1: Red to Pink (0°) -->
          <div class="absolute inset-0 origin-center" style="transform: rotate(0deg); clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 93.3% 25%);">
            <div class="w-full h-full bg-gradient-to-br from-red-500 to-pink-600 flex items-center justify-center">
              <span class="text-white font-bold text-lg absolute" style="top: 20%; left: 70%; transform: translate(-50%, -50%);">Option 1</span>
            </div>
          </div>
          
          <!-- Segment 2: Orange to Yellow (60°) -->
          <div class="absolute inset-0 origin-center" style="transform: rotate(60deg); clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 93.3% 25%);">
            <div class="w-full h-full bg-gradient-to-br from-orange-500 to-yellow-600 flex items-center justify-center">
              <span class="text-white font-bold text-lg absolute" style="top: 20%; left: 70%; transform: translate(-50%, -50%) rotate(-60deg);">Option 2</span>
            </div>
          </div>
          
          <!-- Segment 3: Green to Emerald (120°) -->
          <div class="absolute inset-0 origin-center" style="transform: rotate(120deg); clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 93.3% 25%);">
            <div class="w-full h-full bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center">
              <span class="text-white font-bold text-lg absolute" style="top: 20%; left: 70%; transform: translate(-50%, -50%) rotate(-120deg);">Option 3</span>
            </div>
          </div>
          
          <!-- Segment 4: Blue to Cyan (180°) -->
          <div class="absolute inset-0 origin-center" style="transform: rotate(180deg); clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 93.3% 25%);">
            <div class="w-full h-full bg-gradient-to-br from-blue-500 to-cyan-600 flex items-center justify-center">
              <span class="text-white font-bold text-lg absolute" style="top: 20%; left: 70%; transform: translate(-50%, -50%) rotate(-180deg);">Option 4</span>
            </div>
          </div>
          
          <!-- Segment 5: Indigo to Purple (240°) -->
          <div class="absolute inset-0 origin-center" style="transform: rotate(240deg); clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 93.3% 25%);">
            <div class="w-full h-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
              <span class="text-white font-bold text-lg absolute" style="top: 20%; left: 70%; transform: translate(-50%, -50%) rotate(-240deg);">Option 5</span>
            </div>
          </div>
          
          <!-- Segment 6: Violet to Fuchsia (300°) -->
          <div class="absolute inset-0 origin-center" style="transform: rotate(300deg); clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 93.3% 25%);">
            <div class="w-full h-full bg-gradient-to-br from-violet-500 to-fuchsia-600 flex items-center justify-center">
              <span class="text-white font-bold text-lg absolute" style="top: 20%; left: 70%; transform: translate(-50%, -50%) rotate(-300deg);">Option 6</span>
            </div>
          </div>
          
          <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-24 h-24 rounded-full bg-gradient-to-br from-yellow-400 via-orange-500 to-red-500 shadow-2xl border-4 border-white flex items-center justify-center z-10">
            <span class="text-white font-black text-xl">SPIN</span>
          </div>
        </div>
        
        <div class="absolute inset-0 rounded-full border-8 border-yellow-400 shadow-[0_0_30px_rgba(250,204,21,0.5)] pointer-events-none"></div>
      </div>
      
      <button id="spinBtn" class="mt-12 block mx-auto w-fit cursor-pointer px-12 py-5 bg-gradient-to-r from-yellow-400 via-orange-500 to-red-500 text-white font-black text-2xl rounded-full shadow-2xl hover:shadow-[0_0_40px_rgba(251,146,60,0.8)] hover:scale-110 transition-all duration-300 active:scale-95">
        SPIN THE WHEEL
      </button>
      
      <button id="resetBtn" class="mt-4 block mx-auto w-fit cursor-pointer px-8 py-3 bg-gray-700 text-white font-bold text-lg rounded-full shadow-lg hover:bg-gray-600 transition-all duration-300">
        Reset
      </button>
    </div>
  </div>

  <script>
    const wheel = document.getElementById('wheel');
    const spinBtn = document.getElementById('spinBtn');
    const resetBtn = document.getElementById('resetBtn');
    let isSpinning = false;
    let currentRotation = 0;

    spinBtn.addEventListener('click', () => {
      if (isSpinning) return;
      
      isSpinning = true;
      spinBtn.disabled = true;
      
      // Random rotation: 5-7 full spins + random angle (0-360)
      const minSpins = 5;
      const maxSpins = 7;
      const spins = minSpins + Math.random() * (maxSpins - minSpins);
      const randomDegree = Math.random() * 360;
      const totalRotation = currentRotation + (spins * 360) + randomDegree;
      
      wheel.style.transition = 'transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
      wheel.style.transform = `rotate(${totalRotation}deg)`;
      
      setTimeout(() => {
        currentRotation = totalRotation % 360;
        isSpinning = false;
        spinBtn.disabled = false;
      }, 4000);
    });

    resetBtn.addEventListener('click', () => {
      wheel.style.transition = 'none';
      wheel.style.transform = 'rotate(0deg)';
      currentRotation = 0;
      isSpinning = false;
      spinBtn.disabled = false;
    });
  </script>
</body>
</html>
